name: aves
description: A visual media gallery and metadata explorer app.
repository: https://github.com/deckerst/aves
publish_to: none

# version bump checklist:
# - pubspec version
# - GitHub changelog:     /CHANGELOG.md
# - Play Store changelog: /whatsnew/whatsnew-en-US
# - izzy changelog:       /fastlane/metadata/android/en-US/changelogs/XXX01.txt
# - libre changelog:      /fastlane/metadata/android/en-US/changelogs/XXX.txt
version: 1.14.7+171

environment:
  # this project bundles Flutter SDK via `flutter_wrapper`
  # cf https://github.com/passsy/flutter_wrapper
  flutter: 3.44.4
  sdk: ">=3.12.0 <4.0.0"

workspace:
  - plugins/aves_magnifier
  - plugins/aves_map
  - plugins/aves_model
  - plugins/aves_report
  - plugins/aves_report_crashlytics
  - plugins/aves_screen_state
  - plugins/aves_services
  - plugins/aves_services_google
  - plugins/aves_ui
  - plugins/aves_utils
  - plugins/aves_video
  - plugins/aves_video_exo
  - plugins/aves_video_mpv

# use `scripts/apply_flavor_{flavor}.sh` to set the right dependencies for the flavor
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  aves_magnifier:
    path: plugins/aves_magnifier
  aves_map:
    path: plugins/aves_map
  aves_model:
    path: plugins/aves_model
  aves_report:
    path: plugins/aves_report
  aves_report_platform:
    path: plugins/aves_report_crashlytics
  aves_screen_state:
    path: plugins/aves_screen_state
  aves_services:
    path: plugins/aves_services
  aves_services_platform:
    path: plugins/aves_services_google
  aves_video:
    path: plugins/aves_video
  #  aves_video_exo:
  #    path: plugins/aves_video_exo
  aves_video_mpv:
    path: plugins/aves_video_mpv
  aves_ui:
    path: plugins/aves_ui
  aves_utils:
    path: plugins/aves_utils
  collection:
  community_charts_flutter:
    git:
      url: https://github.com/deckerst/flutter_community_charts.git
      ref: aves
      path: community_charts_flutter
  connectivity_plus:
  country_code:
  csv:
  decorated_icon:
  device_info_plus:
  dlna_dart:
  dynamic_color:
  equatable:
  event_bus:
  expansion_tile_card:
    git:
      url: https://github.com/deckerst/expansion_tile_card.git
  flex_color_picker:
  floating:
  fluster:
  flutter_displaymode:
  flutter_highlight:
  flutter_localizations_plus:
    git:
      url: https://github.com/deckerst/flutter_localizations_plus.git
  flutter_map:
  flutter_markdown_plus:
  flutter_staggered_animations:
    git:
      url: https://github.com/deckerst/flutter_staggered_animations
      ref: aves
  get_it:
  gpx:
  highlight:
  http:
  intl:
  latlong2:
  leak_tracker:
  local_auth:
  material_color_utilities:
  flutter_material_design_icons:
  material_symbols_icons:
  network_info_plus:
  overlay_support:
    git:
      url: https://github.com/deckerst/overlay_support.git
      ref: aves
  package_info_plus:
  panorama:
    git:
      url: https://github.com/deckerst/aves_panorama.git
      ref: aves
  path:
  pattern_lock:
  pdf:
  percent_indicator:
    git:
      url: https://github.com/deckerst/flutter_percent_indicator.git
      ref: aves
  permission_handler:
  pin_code_fields:
  printing:
  proj4dart:
  provider:
  screen_brightness:
  shared_preferences:
  shelf:
  smooth_page_indicator:
  sqflite:
  stack_trace:
  streams_channel:
    git:
      url: https://github.com/deckerst/aves_streams_channel.git
  synchronized:
  url_launcher:
  # `vector_map_tiles` v10.0.0-beta API is unclear to provide sprites
  vector_map_tiles: ^9.0.0-beta
  vector_math:
  vector_tile_renderer:
  volume_controller:
  xml:

dependency_overrides:
  media_kit_video:
    git:
      url: https://github.com/deckerst/media-kit.git
      path: media_kit_video
      ref: video_controller_disposal

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  flutter_lints:
  shared_preferences_platform_interface:
  test:

flutter:
  assets:
    - assets/
  generate: true
  uses-material-design: true

################################################################################
# Localization

# language files:
# - /lib/l10n/app_{language}.arb
# - /android/app/src/main/res/values-{language}/strings.xml
# - edit locale name in /lib/widgets/settings/language/locales.dart

# generate `AppLocalizations`
# % ./flutterw gen-l10n

################################################################################
# Test driver

# generate screenshots (profile mode, specific collection):
# % ./flutterw drive --flavor play -t test_driver/driver_screenshots.dart --profile

################################################################################
# Adaptations

#  `DraggableScrollbar` in `/widgets/common/basic/draggable_scrollbar.dart`
#  adapts from package `draggable_scrollbar` v0.0.4
#
#  `Magnifier` in `/widgets/common/magnifier/magnifier.dart`
#  adapts from package `photo_view` v0.9.2
#
#  `AvesHighlightView` in `/widgets/common/aves_highlight.dart`
#  adapts from package `flutter_highlight` v0.7.0
#
#  `OutputBuffer` in `/services/common/output_buffer.dart`
#  adapts from Flutter v3.41.9 `_OutputBuffer` in `/foundation/consolidate_response.dart`
#
#  `TvLicensePage` in `/widgets/about/tv_license_page.dart`
#  adapts from Flutter v3.41.9 `_LicenseData` in `/material/about.dart`
#  and `_PackageLicensePage` in `/material/about.dart`
#
#  `OverlaySnackBar` in `/widgets/common/action_mixins/overlay_snack_bar.dart`
#  adapts from Flutter v3.41.9 `SnackBar` in `/material/snack_bar.dart`
#
#  `AGestureDetector` in `/widgets/common/basic/gestures/gesture_detector.dart`
#  adapts from Flutter v3.41.9 `GestureDetector` in `/widgets/gesture_detector.dart`
#
#  `AInkResponse` in `/widgets/common/basic/gestures/ink_well.dart`
#  adapts from Flutter v3.41.9 `InkResponse` and related classes in `/material/ink_well.dart`
#
#  `EagerScaleGestureRecognizer` in `/widgets/common/behaviour/eager_scale_gesture_recognizer.dart`
#  adapts from Flutter v3.41.9 `ScaleGestureRecognizer` in `/gestures/scale.dart`
#
#  `KnownExtentScrollPhysics` in `/widgets/common/behaviour/known_extent_scroll_physics.dart`
#  adapts from Flutter v3.41.9 `FixedExtentScrollPhysics` in `/widgets/list_wheel_scroll_view.dart`
#
#  `TransitionImage` in `/widgets/common/fx/transition_image.dart`
#  adapts from Flutter v3.41.9 `_ImageState` in `/widgets/image.dart`
#  and `paintImage` in `/painting/decoration_image.dart`
#
#  `_RenderSliverKnownExtentBoxAdaptor` in `/widgets/common/grid/sliver.dart`
#  adapts from Flutter v3.41.9 `RenderSliverFixedExtentBoxAdaptor` in `/rendering/sliver_fixed_extent_list.dart`
#
#  `AvesSearchDelegate`, `SearchPageRoute` in `/widgets/common/search/*.dart`
#  adapts from Flutter v3.41.9 `SearchDelegate`, `_SearchPageRoute` in `/material/search.dart`
